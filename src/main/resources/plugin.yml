name: QuickMenu
version: ${project.version}
main: com.quickmenu.QuickMenu
api-version: '1.21'
depend: [floodgate]
author: QuickMenu
description: A simple menu plugin for both Bedrock and Java Edition

commands:
  menu:
    description: Open the menu
    usage: /menu
  quickmenu:
    description: QuickMenu admin commands
    usage: /quickmenu <reload|version>
    permission: quickmenu.admin
